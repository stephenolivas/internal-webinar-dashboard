name: Update Webinar Dashboard

# Triggered by cron-job.org via a webhook POST to the GitHub API.
# cron-job.org URL format:
#   https://api.github.com/repos/YOUR_USERNAME/webinar-dashboard/actions/workflows/update.yml/dispatches
# With JSON body: { "ref": "main" }
# And header:     Authorization: Bearer YOUR_GITHUB_PAT

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data & regenerate dashboard
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if something actually changed
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: update dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
